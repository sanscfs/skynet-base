name: build
on:
  push:
    branches: [main]
    paths:
      - requirements-common.txt
      - Dockerfile
      - .github/workflows/build.yml
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'  # weekly rebuild — pick up upstream CVE patches

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: [self-hosted, linux, x64, k3s]
    strategy:
      matrix:
        py: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          build-args: PY_VERSION=${{ matrix.py }}
          tags: |
            docker-hosted.sanscfs.dev/skynet-base:py${{ matrix.py }}
            docker-hosted.sanscfs.dev/skynet-base:py${{ matrix.py }}-${{ github.sha }}
            ghcr.io/sanscfs/skynet-base:py${{ matrix.py }}
            ghcr.io/sanscfs/skynet-base:py${{ matrix.py }}-${{ github.sha }}
          cache-from: type=registry,ref=docker-hosted.sanscfs.dev/skynet-base:py${{ matrix.py }}-buildcache
          cache-to:   type=registry,ref=docker-hosted.sanscfs.dev/skynet-base:py${{ matrix.py }}-buildcache,mode=max,image-manifest=true,oci-mediatypes=true
          push: true
