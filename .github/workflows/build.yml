name: build

on:
  push:
    branches: [main]
    paths:
      - requirements-common.txt
      - Dockerfile
      - .github/workflows/build.yml
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'  # weekly rebuild — pick up upstream CVE patches

jobs:
  build:
    uses: sanscfs/skynet-ci/.github/workflows/build.yml@main
    with:
      component: skynet-base
      build-args: |
        PY_VERSION=3.12
      rolling-tag: py3.12
      extra-tags: |
        docker-hosted.sanscfs.dev/skynet-base:py3.12-${{ github.sha }}
        ghcr.io/sanscfs/skynet-base:py3.12-${{ github.sha }}
    secrets: inherit
